<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Seva Admin — Jagannath Danmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body { background:#f7f5f0; }
.admin-wrap { max-width:1100px; margin:0 auto; padding:2rem; }

.login-box { max-width:380px; margin:8rem auto; background:white; border-radius:12px; border:1px solid var(--border); padding:2.5rem; text-align:center; }
.login-box h2 { font-family:var(--font-d); font-size:1.8rem; margin-bottom:.25rem; }
.login-box p { font-size:13px; color:var(--text-muted); margin-bottom:1.5rem; }
.login-box input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-size:15px; margin-bottom:.75rem; outline:none; }
.login-box input:focus { border-color:var(--gold); }
.login-box button { width:100%; padding:12px; background:var(--saffron); color:white; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
.login-box button:hover { background:#c5520a; }
.login-err { color:#c00; font-size:13px; margin-top:.5rem; display:none; }

.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
.admin-title { font-family:var(--font-d); font-size:2rem; font-weight:600; color:var(--night); }
.admin-title span { font-size:1rem; color:var(--text-muted); font-family:var(--font-b); font-weight:400; margin-left:.5rem; }

.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1rem; margin-bottom:2rem; }
.stat-card { background:white; border-radius:10px; border:1px solid var(--border); padding:1.25rem; text-align:center; }
.stat-num { font-family:var(--font-d); font-size:2.2rem; font-weight:600; color:var(--night); line-height:1; }
.stat-label { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-top:.25rem; }
.stat-card.pending .stat-num { color:var(--saffron); }
.stat-card.approved .stat-num { color:#2a7a2a; }
.stat-card.completed .stat-num { color:var(--gold); }

.controls { display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }
.controls input { padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; outline:none; min-width:200px; }
.controls select { padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; outline:none; background:white; }
.export-btn { margin-left:auto; padding:9px 18px; background:var(--night); color:white; border:none; border-radius:6px; font-size:13px; cursor:pointer; font-weight:500; }
.export-btn:hover { background:var(--night-mid); }

.signups-table { width:100%; background:white; border-radius:10px; border:1px solid var(--border); overflow:hidden; }
.signups-table table { width:100%; border-collapse:collapse; }
.signups-table th { background:var(--night); color:rgba(255,255,255,.7); font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding:12px 16px; text-align:left; font-weight:500; }
.signups-table td { padding:13px 16px; font-size:14px; color:var(--text-mid); border-bottom:1px solid rgba(200,145,26,.08); vertical-align:middle; }
.signups-table tr:last-child td { border-bottom:none; }
.signups-table tr:hover td { background:var(--cream); }

.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; letter-spacing:.04em; }
.badge.pending { background:#fff3e0; color:#e65100; }
.badge.approved { background:#e8f5e9; color:#2e7d32; }
.badge.completed { background:var(--gold-light); color:var(--gold); }
.badge.cancelled { background:#fce4ec; color:#c62828; }

.action-btns { display:flex; gap:.4rem; flex-wrap:wrap; }
.action-btns button { padding:5px 10px; border-radius:4px; border:1px solid var(--border); background:white; font-size:12px; cursor:pointer; transition:all .2s; }
.action-btns .approve { border-color:#4caf50; color:#2e7d32; }
.action-btns .approve:hover { background:#e8f5e9; }
.action-btns .complete { border-color:var(--gold); color:var(--gold); }
.action-btns .complete:hover { background:var(--gold-light); }
.action-btns .del { border-color:#f44336; color:#c62828; }
.action-btns .del:hover { background:#fce4ec; }

.empty-state { text-align:center; padding:4rem 2rem; color:var(--text-muted); }
.empty-state .icon { font-size:2.5rem; margin-bottom:1rem; opacity:.4; }

.seva-tags { display:flex; flex-wrap:wrap; gap:4px; }
.seva-tag { background:var(--saffron-light); color:var(--saffron); font-size:11px; padding:2px 8px; border-radius:10px; }

.detail-panel { position:fixed; top:0; right:-420px; width:400px; height:100vh; background:white; border-left:1px solid var(--border); padding:2rem; overflow-y:auto; transition:right .3s; z-index:500; box-shadow:-4px 0 20px rgba(0,0,0,.08); }
.detail-panel.open { right:0; }
.detail-panel h3 { font-family:var(--font-d); font-size:1.4rem; margin-bottom:1.5rem; padding-bottom:.75rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.detail-panel .close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-muted); }
.detail-row { margin-bottom:1rem; }
.detail-row .dl { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:3px; }
.detail-row .dv { font-size:14px; color:var(--text); }
.panel-actions { display:flex; flex-direction:column; gap:.5rem; margin-top:2rem; }
.panel-actions button { padding:10px; border-radius:6px; border:1px solid var(--border); background:white; cursor:pointer; font-size:14px; transition:all .2s; }
.panel-actions .p-approve { background:#e8f5e9; border-color:#4caf50; color:#2e7d32; font-weight:500; }
.panel-actions .p-complete { background:var(--gold-light); border-color:var(--gold); color:var(--gold); font-weight:500; }
.panel-actions .p-del { color:#c62828; border-color:#f44336; }
.panel-actions .p-del:hover { background:#fce4ec; }

@media(max-width:700px){
  .signups-table { overflow-x:auto; }
  .detail-panel { width:100%; right:-100%; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="admin-wrap">
    <div class="login-box">
      <div style="font-size:2rem;margin-bottom:.75rem">🪬</div>
      <h2>Seva Admin</h2>
      <p>Jagannath Danmark · Temple Coordinator Portal</p>
      <input type="password" id="pwd-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">Sign in</button>
      <div class="login-err" id="login-err">Incorrect password. Please try again.</div>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-screen" style="display:none">
  <div class="admin-wrap">
    <div class="admin-header">
      <div>
        <div class="admin-title">Seva Dashboard <span id="subtitle-count"></span></div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:3px">Jagannath Danmark — Temple Coordinator</div>
      </div>
      <div style="display:flex;gap:.75rem;align-items:center">
        <a href="seva.html" target="_blank" style="font-size:13px;color:var(--saffron);text-decoration:none">↗ Public signup page</a>
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
        <button onclick="doLogout()" style="padding:9px 16px;background:none;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer">Sign out</button>
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="controls">
      <input type="text" id="search-box" placeholder="Search by name, seva, or phone..." oninput="renderTable()">
      <select id="filter-status" onchange="renderTable()">
        <option value="all">All statuses</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="filter-seva" onchange="renderTable()">
        <option value="all">All sevas</option>
      </select>
      <button class="export-btn" onclick="loadData()" style="background:var(--saffron)">↻ Refresh</button>
    </div>

    <div class="signups-table">
      <table>
        <thead>
          <tr>
            <th>Devotee</th>
            <th>Contact</th>
            <th>Seva(s)</th>
            <th>Date / Days</th>
            <th>Status</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <h3>Seva Request <button class="close" onclick="closeDetail()">✕</button></h3>
  <div id="detail-content"></div>
  <div class="panel-actions" id="panel-actions"></div>
</div>

<script src="seva-db.js"></script>
<script>
const STORAGE_KEY = 'seva-signups';
const ADMIN_PASS = 'jagannath2026';
let signups = [];
let currentId = null;

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

async function loadData() {
  try {
    signups = await adminLoadData();
  } catch(e) {
    signups = [];
    console.error('Load error:', e);
  }
  renderStats();
  renderTable();
  populateSevaFilter();
}

function renderStats() {
  const total = signups.length;
  const pending = signups.filter(s=>s.status==='pending').length;
  const approved = signups.filter(s=>s.status==='approved').length;
  const completed = signups.filter(s=>s.status==='completed').length;
  document.getElementById('subtitle-count').textContent = `(${total} total)`;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total signups</div></div>
    <div class="stat-card pending"><div class="stat-num">${pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card approved"><div class="stat-num">${approved}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card completed"><div class="stat-num">${completed}</div><div class="stat-label">Completed</div></div>
  `;
}

function populateSevaFilter() {
  const all = new Set(signups.flatMap(s=>s.sevas||[]));
  const sel = document.getElementById('filter-seva');
  sel.innerHTML = '<option value="all">All sevas</option>' +
    [...all].map(s=>`<option value="${s}">${s}</option>`).join('');
}

function renderTable() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  const fv = document.getElementById('filter-seva').value;

  let filtered = signups.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q) || (s.phone||'').includes(q) || (s.sevas||[]).join(' ').toLowerCase().includes(q);
    const matchS = fs==='all' || s.status===fs;
    const matchV = fv==='all' || (s.sevas||[]).includes(fv);
    return matchQ && matchS && matchV;
  });

  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🙏</div><div>No signups found</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(s => `
    <tr style="cursor:pointer" onclick="openDetail('${s.id}')">
      <td><strong style="color:var(--night)">${s.name}</strong>${s.exp ? `<br><span style="font-size:11px;color:var(--text-muted)">${s.exp}</span>` : ''}</td>
      <td>${s.phone ? `📞 ${s.phone}<br>` : ''}${s.email ? `<span style="font-size:12px">${s.email}</span>` : ''}</td>
      <td><div class="seva-tags">${(s.sevas||[]).map(sv=>`<span class="seva-tag">${sv}</span>`).join('')}</div></td>
      <td>${s.dateStart || '—'}<br><span style="font-size:11px;color:var(--text-muted)">${s.days||''}</span></td>
      <td><span class="badge ${s.status}">${s.status}</span></td>
      <td style="font-size:12px">${new Date(s.submittedAt).toLocaleDateString('da-DK')}</td>
      <td onclick="event.stopPropagation()">
        <div class="action-btns">
          ${s.status==='pending' ? `<button class="approve" onclick="updateStatus('${s.id}','approved')">Approve</button>` : ''}
          ${s.status==='approved' ? `<button class="complete" onclick="updateStatus('${s.id}','completed')">Complete</button>` : ''}
          <button class="del" onclick="deleteSeva('${s.id}')">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openDetail(id) {
  currentId = id;
  const s = signups.find(x=>x.id===id);
  if (!s) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-row"><div class="dl">Name</div><div class="dv">${s.name}</div></div>
    <div class="detail-row"><div class="dl">Phone</div><div class="dv">${s.phone||'—'}</div></div>
    <div class="detail-row"><div class="dl">Email</div><div class="dv">${s.email||'—'}</div></div>
    <div class="detail-row"><div class="dl">Experience</div><div class="dv">${s.exp||'—'}</div></div>
    <div class="detail-row"><div class="dl">Sevas requested</div><div class="dv"><div class="seva-tags" style="margin-top:4px">${(s.sevas||[]).map(sv=>`<span class="seva-tag">${sv}</span>`).join('')}</div></div></div>
    <div class="detail-row"><div class="dl">Start date</div><div class="dv">${s.dateStart||'—'}</div></div>
    <div class="detail-row"><div class="dl">Available days</div><div class="dv">${s.days||'—'}</div></div>
    <div class="detail-row"><div class="dl">Notes</div><div class="dv">${s.notes||'None'}</div></div>
    <div class="detail-row"><div class="dl">Status</div><div class="dv"><span class="badge ${s.status}">${s.status}</span></div></div>
    <div class="detail-row"><div class="dl">Submitted</div><div class="dv">${new Date(s.submittedAt).toLocaleString('da-DK')}</div></div>
    ${s.phone ? `<a href="https://wa.me/${s.phone.replace(/[^0-9]/g,'')}" target="_blank" class="btn-whatsapp" style="display:inline-flex;margin-top:.5rem;font-size:13px;padding:8px 14px;text-decoration:none"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> WhatsApp ${s.name.split(' ')[0]}</a>` : ''}
  `;
  document.getElementById('panel-actions').innerHTML = `
    ${s.status==='pending' ? `<button class="p-approve" onclick="updateStatus('${s.id}','approved')">✓ Approve seva</button>` : ''}
    ${s.status==='approved' ? `<button class="p-complete" onclick="updateStatus('${s.id}','completed')">★ Mark completed</button>` : ''}
    ${s.status!=='cancelled' ? `<button onclick="updateStatus('${s.id}','cancelled')">Cancel seva</button>` : ''}
    <button class="p-del" onclick="deleteSeva('${s.id}')">Delete record</button>
  `;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  currentId = null;
}

async function updateStatus(id, status) {
  signups = await adminUpdateStatus(signups, id, status);
  renderStats(); renderTable();
  if (currentId === id) openDetail(id);
}

async function deleteSeva(id) {
  if (!confirm('Delete this seva signup? This cannot be undone.')) return;
  signups = await adminDelete(signups, id);
  renderStats(); renderTable(); closeDetail();
}

function exportCSV() {
  const headers = ['Name','Phone','Email','Experience','Sevas','Start Date','Days','Notes','Status','Submitted'];
  const rows = signups.map(s => [
    s.name, s.phone||'', s.email||'', s.exp||'',
    (s.sevas||[]).join(' | '), s.dateStart||'', s.days||'',
    (s.notes||'').replace(/,/g,';'), s.status,
    new Date(s.submittedAt).toLocaleDateString('da-DK')
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jagannath-seva-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
